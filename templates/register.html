{% extends 'base.html' %}
{% block title %}РЕГИСТРАЦИЯ — ТУРДУБНА{% endblock %}

{% block extra_css %}
<style>
    * { transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease; }
    .auth-full-overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        display: flex; align-items: center; justify-content: center;
        background: var(--bg); z-index: 999;
    }
    .auth-card {
        background: var(--card-bg); border: 1px solid var(--border); border-radius: 50px;
        padding: 50px; width: 100%; max-width: 500px; box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }
    .auth-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 3rem; margin: 0; letter-spacing: -2px; color: var(--text-main); text-transform: uppercase; }
    .form-group { margin-top: 20px; position: relative; text-align: left; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-sec); font-size: 0.7rem; text-transform: uppercase; }
    .auth-card input { width: 100% !important; padding: 18px 20px !important; border-radius: 18px !important; background: var(--bg) !important; border: 1px solid var(--border) !important; color: var(--text-main) !important; box-sizing: border-box !important; }
    .helptext { display: none; }
    .eye-btn { position: absolute; right: 15px; top: 35px; background: none; border: none; color: var(--text-sec); cursor: pointer; }
</style>
{% endblock %}

{% block content %}
<div class="auth-full-overlay">
    <div class="auth-card">
        <h1 class="auth-title">РЕГИСТРАЦИЯ</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if 'password' in field.name %}
                        <button type="button" class="eye-btn" onclick="tgl('{{ field.auto_id }}')">👁️</button>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width:100%; padding:22px; border-radius:22px; font-weight:900; margin-top:30px;">СОЗДАТЬ АККАУНТ</button>
        </form>
    </div>
</div>
<script>
    function tgl(id) { const i = document.getElementById(id); i.type = i.type === 'password' ? 'text' : 'password'; }
</script>
{% endblock %}
