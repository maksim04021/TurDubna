{% extends 'base.html' %}
{% block title %}ВХОД — ТУРДУБНА{% endblock %}

{% block extra_css %}
<style>
    /* 1. ГЛОБАЛЬНАЯ ПЛАВНОСТЬ (для переключения тем) */
    * { transition: background 0.5s ease, color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease; }

    /* 2. ИДЕАЛЬНОЕ ЦЕНТРИРОВАНИЕ */
    .auth-page-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 120px); /* Высота экрана минус навбар */
        width: 100%;
        padding: 20px;
        box-sizing: border-box;
    }

    .auth-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 50px;
        padding: 60px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        text-align: left;
    }

    .auth-title {
        font-family: 'Montserrat', sans-serif; font-weight: 900;
        font-size: 3.8rem; margin: 0 0 10px; letter-spacing: -3px;
        color: var(--text-main); text-transform: uppercase;
    }

    .auth-subtitle { color: var(--text-sec); margin-bottom: 40px; font-size: 1.1rem; font-weight: 500; }

    /* 3. ОФОРМЛЕНИЕ ПОЛЕЙ (как на скрине) */
    .form-group { margin-bottom: 25px; position: relative; width: 100%; }
    .form-group label {
        display: block; margin-bottom: 10px; font-weight: 700;
        color: var(--text-sec); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
    }

    .auth-card input {
        width: 100% !important;
        padding: 20px 25px !important;
        border-radius: 20px !important;
        background: var(--bg) !important;
        border: 1px solid var(--border) !important;
        color: var(--text-main) !important;
        font-size: 1rem !important;
        box-sizing: border-box !important;
        transition: 0.3s;
    }
    .auth-card input:focus { outline: none; border-color: var(--primary) !important; }

    /* Кнопка «глаз» */
    .eye-toggle {
        position: absolute; right: 20px; top: 42px;
        background: none; border: none; cursor: pointer;
        color: var(--text-sec); font-size: 1.2rem; padding: 5px;
    }

    /* 4. КНОПКА ВОЙТИ */
    .btn-auth {
        width: 100%; padding: 22px; border-radius: 22px;
        background: var(--primary); color: white; border: none;
        font-weight: 900; font-size: 1.1rem; cursor: pointer;
        margin-top: 15px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn-auth:hover { transform: scale(1.02); filter: brightness(1.1); box-shadow: 0 15px 30px rgba(0, 122, 255, 0.3); }

    .auth-footer { text-align: center; margin-top: 30px; color: var(--text-sec); font-size: 1rem; }
    .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 700; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">ВХОД</h1>
        <p class="auth-subtitle">С возвращением в наукоград!</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Имя пользователя</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label>Пароль</label>
                {{ form.password }}
                <button type="button" class="eye-toggle" onclick="togglePass()">👁️</button>
            </div>

            <button type="submit" class="btn-auth">АВТОРИЗОВАТЬСЯ</button>
        </form>

        <div class="auth-footer">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </div>
    </div>
</div>

<script>
    function togglePass() {
        const passInput = document.querySelector('input[type="password"]') || document.querySelector('input[name="password"]');
        if (passInput) {
            passInput.type = passInput.type === 'password' ? 'text' : 'password';
        }
    }
</script>
{% endblock %}
